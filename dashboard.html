<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC IT Support Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .ticket-card { border-left: 5px solid #0d6efd; transition: 0.3s; }
        .ticket-card:hover { transform: scale(1.01); }
        .status-pending { color: #ffc107; font-weight: bold; }
        .status-resolved { color: #198754; font-weight: bold; }
        .menu-btn.active { font-weight: 700; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">📺 KBC IT Ticket Monitor</span>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex gap-2 mb-3">
        <button id="menu-pending" class="btn btn-primary menu-btn active" type="button">Pending</button>
        <button id="menu-history" class="btn btn-outline-primary menu-btn" type="button">Resolved History</button>
    </div>

    <div class="row" id="ticket-container">
        <div class="text-center mt-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Waiting for live tickets...</p>
        </div>
    </div>
</div>

<script src="dashboard-config.local.js"></script>
<script type="module" src="dashboard.js"></script>
</body>
</html>
